services:
  backend:
    build:
      context: ./backend
    container_name: aeonic-backend
    environment:
      APP_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://partner.aeonichealthsystems.com,https://nexus.aeonichealthsystems.com,https://www.aeonichealthsystems.com,https://aeonichealthsystems.com}
      NEXUS_DNS_TARGET: ${NEXUS_DNS_TARGET:-nexus.aeonichealthsystems.com}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
      CLOUDFLARE_CUSTOM_HOSTNAME_SSL_METHOD: ${CLOUDFLARE_CUSTOM_HOSTNAME_SSL_METHOD:-http}
      CLOUDFLARE_CUSTOM_HOSTNAME_CA: ${CLOUDFLARE_CUSTOM_HOSTNAME_CA:-}
      CLOUDFLARE_CUSTOM_HOSTNAME_ORIGIN: ${CLOUDFLARE_CUSTOM_HOSTNAME_ORIGIN:-}
      CLOUDFLARE_CUSTOM_HOSTNAME_ORIGIN_SNI: ${CLOUDFLARE_CUSTOM_HOSTNAME_ORIGIN_SNI:-}
    expose:
      - "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - backend_data:/app/.data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nexus:
    build:
      context: ./apps/nexus
      args:
        VITE_API_BASE_URL: ${NEXUS_API_BASE_URL:-https://api.aeonichealthsystems.com}
    container_name: aeonic-nexus
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: aeonic-caddy
    depends_on:
      - backend
      - nexus
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_CERTS_PATH:-/home/deploy/.aeonic-secrets/caddy}:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  backend_data:
  caddy_data:
  caddy_config:

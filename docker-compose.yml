services:
  backend:
    build:
      context: ./backend
    container_name: aeonic-backend
    environment:
      APP_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://partner.aeonichealthsystems.com,https://nexus.aeonichealthsystems.com,https://www.aeonichealthsystems.com,https://aeonichealthsystems.com}
    ports:
      - "80:8000"
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
